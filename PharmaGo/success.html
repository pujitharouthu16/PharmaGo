<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Successful</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #83a4d4, #b6fbff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .success-box {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
    }
    h2 { color: #28a745; }
    p { margin: 10px 0; }
  </style>
</head>
<body>
  <div class="success-box">
    <h2>🎉 Order Successful!</h2>
    <p id="userName"></p>
    <p id="paymentMethod"></p>
    <p id="totalAmount"></p>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const name = urlParams.get('name');
    const payment = urlParams.get('payment');
    const total = urlParams.get('total');

    document.getElementById("userName").textContent = "Thank you, " + name + "!";
    document.getElementById("paymentMethod").textContent = "Payment Method: " + payment;
    document.getElementById("totalAmount").textContent = "Total Paid: ₹" + total;
  </script>
</body>
</html>
