<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f9f9f9; }
    h2 { margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    th { background: #f2f2f2; }
    .checkout-btn {
      display: inline-block;
      padding: 10px 20px;
      background: #007bff;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h2>Your Shopping Cart</h2>
  <table>
    <tr>
      <th>Product</th>
      <th>Qty</th>
      <th>Price</th>
    </tr>
    <tr>
      <td>Glucose Monitor</td>
      <td>1</td>
      <td>₹250</td>
    </tr>
    <tr>
      <td>Test Strips</td>
      <td>1</td>
      <td>₹40</td>
    </tr>
    <tr>
      <th colspan="2">Total</th>
      <th>₹290</th>
    </tr>
  </table>

  <!-- Checkout Button -->
<a href="cheackout.html"><button style="display: inline-block;
      padding: 10px 20px;
      background: #007bff;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;">Proceed</button></a>
</body>
</html>
